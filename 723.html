<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sint-Augustinus | Portal Access Granted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d62;
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --white: #ffffff;
            --success: #27ae60;
            --bg-color: #f8f9fa;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-blue);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .logo {
            max-width: 150px;
            margin-bottom: 1rem;
        }

        .status-banner {
            background: var(--success);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            padding: 0.5rem;
            letter-spacing: 5px;
            font-family: 'Roboto Mono', monospace;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        .access-card {
            background: var(--white);
            padding: 4rem 3rem;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            border: 2px solid var(--gold);
        }

        .access-card::before {
            content: "AUTHENTICATED";
            position: absolute;
            top: 30px;
            right: -35px;
            background: var(--success);
            color: white;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-weight: 700;
            font-size: 0.7rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-blue);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: #555;
        }

        .btn-portal {
            display: inline-block;
            background: var(--primary-blue);
            color: var(--white);
            padding: 1.5rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 45, 98, 0.2);
            border: 2px solid transparent;
        }

        .btn-portal:hover {
            background: var(--white);
            color: var(--primary-blue);
            border-color: var(--primary-blue);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 45, 98, 0.3);
        }

        .icon-lock {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: var(--gold);
        }

        footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="status-banner">ACCESS GRANTED - ENCRYPTION BYPASSED</div>
        <img src="logo.png" alt="Sint-Augustinus Logo" class="logo">
    </header>

    <div class="container">
        <div class="access-card">
            <div class="icon-lock">🔓</div>
            <h1>Authentication Successful</h1>
            <p>You have successfully replicated the principal's access credentials. The school portal is now accessible for investigation.</p>
            
            <a href="https://lockdown-st-aug.streamlit.app/" class="btn-portal">Enter School Portal</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Basisschool Sint-Augstinus | Forensics Unit</p>
    </footer>
</body>
</html>
